# Insight Harbor — Deploy Dashboard to Azure Static Web App
# Triggers on pushes to main that change dashboard HTML files.
# Uses the Azure Static Web Apps deploy action.

name: Deploy Dashboard (SWA)

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/html/**'
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dashboard/html
          skip_app_build: true
          skip_api_build: true
